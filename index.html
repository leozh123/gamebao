<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBao - 个人游戏开发者平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        nav {
            background: #1a1a1a;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b35, #f7c948);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            color: #aaa; text-decoration: none; font-size: 0.95rem;
            transition: color 0.3s; display: flex; align-items: center; gap: 0.4rem;
        }
        .nav-links a:hover { color: #ff6b35; }
        .btn {
            padding: 0.5rem 1.5rem; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.3s; font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff6b35, #f7c948); color: #000;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,53,0.3);
        }
        .btn-sm { padding: 0.35rem 0.85rem; font-size: 0.8rem; }

        .hero {
            text-align: center; padding: 4rem 2rem 3rem;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b3d 50%, #1a0a2e 100%);
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,107,53,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(247,201,72,0.06) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; position: relative; }
        .hero h1 i { margin-right: 0.5rem; color: #ff6b35; }
        .hero p { font-size: 1.15rem; color: #aaa; margin-bottom: 2rem; position: relative; }
        .hero-features {
            display: flex; justify-content: center; gap: 2.5rem;
            margin-top: 2.5rem; position: relative; flex-wrap: wrap;
        }
        .feature-item { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .feature-icon {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .feature-icon.o1 { background: rgba(255,107,53,0.15); color: #ff6b35; }
        .feature-icon.o2 { background: rgba(247,201,72,0.15); color: #f7c948; }
        .feature-icon.o3 { background: rgba(236,72,153,0.15); color: #ec4899; }
        .feature-icon.o4 { background: rgba(6,182,212,0.15); color: #06b6d4; }
        .feature-label { font-size: 0.82rem; color: #888; }

        .games-section { padding: 3rem 2rem; max-width: 1200px; margin: 0 auto; }
        .section-title {
            font-size: 1.4rem; margin-bottom: 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-title span { display: flex; align-items: center; gap: 0.5rem; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: #1a1a1a; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: all 0.3s; border: 1px solid #222;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border-color: #ff6b35;
        }
        .game-thumbnail {
            width: 100%; height: 180px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
        }
        .game-thumbnail img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .game-tag {
            position: absolute; top: 10px; left: 10px;
            padding: 3px 10px; border-radius: 20px; font-size: 0.72rem;
            font-weight: 600; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }
        .game-info { padding: 1rem; }
        .game-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
        .game-author { color: #888; font-size: 0.82rem; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.3rem; }
        .game-stats { display: flex; gap: 1rem; font-size: 0.8rem; color: #666; }
        .game-stats span { display: flex; align-items: center; gap: 0.3rem; }
        .play-btn {
            display: block; width: calc(100% - 2rem); margin: 0.8rem 1rem 1rem;
            padding: 0.65rem; background: linear-gradient(45deg, #ff6b35, #f7c948);
            color: #000; text-align: center; text-decoration: none;
            border-radius: 8px; font-weight: 700; font-size: 0.85rem;
            transition: all 0.3s;
        }
        .play-btn:hover { box-shadow: 0 5px 20px rgba(255,107,53,0.4); }

        .upload-page { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .upload-page h2 { text-align: center; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .upload-page .subtitle { text-align: center; color: #666; margin-bottom: 2.5rem; }
        .upload-form {
            background: #1a1a1a; padding: 2rem;
            border-radius: 12px; border: 1px solid #222;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 0.4rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 0.75rem 1rem;
            background: #0f0f0f; border: 1px solid #333; border-radius: 8px;
            color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #ff6b35; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .submit-row { text-align: center; margin-top: 1.5rem; }
        .submit-row button { padding: 0.8rem 3rem; font-size: 1rem; }

        .play-page { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .play-bar {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1rem; padding: 0.8rem 1rem;
            background: #1a1a1a; border-radius: 10px; border: 1px solid #222;
            flex-wrap: wrap;
        }
        .play-bar .back-link {
            color: #aaa; text-decoration: none; font-size: 0.9rem;
            display: flex; align-items: center; gap: 0.4rem; transition: color 0.3s;
        }
        .play-bar .back-link:hover { color: #ff6b35; }
        .play-bar .game-name { flex: 1; font-weight: 600; min-width: 150px; }
        .game-frame-wrap {
            background: #000; border-radius: 12px; overflow: hidden;
            border: 1px solid #222; position: relative;
        }
        .game-frame-wrap iframe {
            width: 100%; height: 650px; border: none; display: block;
        }

        footer {
            background: #111; text-align: center; padding: 2.5rem;
            color: #555; margin-top: 4rem; border-top: 1px solid #1a1a1a;
        }
        footer p { margin-bottom: 0.4rem; }
        footer .footer-tags {
            margin-top: 1rem; display: flex; justify-content: center; gap: 1.5rem; font-size: 0.8rem; flex-wrap: wrap;
        }
        footer .footer-tags span { display: flex; align-items: center; gap: 0.3rem; }

        .page { display: block; }
        .page[style*="none"] { display: none !important; }

        .empty-state {
            text-align: center; padding: 4rem 2rem; color: #444;
            grid-column: 1/-1;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; display: block; }
        .empty-state p { font-size: 1.1rem; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff6b35; color: #000; padding: 0.8rem 2rem;
            border-radius: 30px; font-weight: 600; font-size: 0.9rem;
            z-index: 9999; animation: slideDown 0.3s ease;
            box-shadow: 0 5px 20px rgba(255,107,53,0.3);
        }
        @keyframes slideDown {
            from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .hero-features { gap: 1.2rem; }
            .games-grid { grid-template-columns: 1fr; }
            .nav-links { gap: 1rem; }
            .nav-links a span.nav-text { display: none; }
            .game-frame-wrap iframe { height: 500px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')"><i class="fas fa-gamepad"></i> GameBao</div>
    <div class="nav-links">
        <a href="#" onclick="showPage('home'); return false;"><i class="fas fa-home"></i> <span class="nav-text">首页</span></a>
        <a href="#" onclick="showPage('browse'); return false;"><i class="fas fa-compass"></i> <span class="nav-text">浏览</span></a>
        <button class="btn btn-primary" onclick="showPage('upload')"><i class="fas fa-cloud-upload-alt"></i> 发布游戏</button>
    </div>
</nav>

<!-- 首页 -->
<div id="home-page" class="page">
    <div class="hero">
        <h1><i class="fas fa-gamepad"></i> GameBao</h1>
        <p>上传即玩 · 开发者互动 · 实时反馈</p>
        <button class="btn btn-primary" style="font-size: 1.05rem; padding: 1rem 3rem;" onclick="showPage('upload')">
            <i class="fas fa-plus-circle"></i> 发布你的游戏
        </button>
        <div class="hero-features">
            <div class="feature-item">
                <div class="feature-icon o1"><i class="fas fa-bolt"></i></div>
                <span class="feature-label">一键发布</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon o2"><i class="fas fa-play-circle"></i></div>
                <span class="feature-label">上传即玩</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon o3"><i class="fas fa-globe"></i></div>
                <span class="feature-label">公开分享</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon o4"><i class="fas fa-shield-alt"></i></div>
                <span class="feature-label">零成本托管</span>
            </div>
        </div>
    </div>

    <div class="games-section">
        <div class="section-title">
            <span><i class="fas fa-fire" style="color:#ff6b35;"></i> 已发布的游戏</span>
        </div>
        <div class="games-grid" id="featured-games"></div>
    </div>
</div>

<!-- 浏览页 -->
<div id="browse-page" class="page" style="display:none;">
    <main class="games-section" style="padding-top: 2rem;">
        <div class="section-title">
            <span><i class="fas fa-th-large"></i> 所有游戏 (<span id="game-count">0</span>)</span>
        </div>
        <div class="games-grid" id="all-games"></div>
    </main>
</div>

<!-- 发布页 -->
<div id="upload-page" class="page" style="display:none;">
    <main class="upload-page">
        <h2><i class="fas fa-cloud-upload-alt"></i> 发布游戏</h2>
        <p class="subtitle">填写游戏信息，提交后通过 GitHub Actions 自动发布</p>

        <div class="upload-form">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> 游戏名称 *</label>
                <input type="text" placeholder="给你的游戏起个名字" id="gameNameInput">
            </div>
            <div class="form-group">
                <label><i class="fas fa-link"></i> 游戏链接 *</label>
                <input type="url" placeholder="https://example.github.io/game/index.html" id="gameUrlInput">
                <p style="font-size:0.8rem;color:#666;margin-top:0.3rem;">支持 GitHub Pages、Netlify、Vercel 等托管的游戏链接</p>
            </div>
            <div class="form-group">
                <label><i class="fas fa-image"></i> 封面图片链接（可选）</label>
                <input type="url" placeholder="https://example.github.io/game/cover.jpg" id="coverUrlInput">
            </div>
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> 游戏描述（可选）</label>
                <textarea placeholder="简单介绍一下你的游戏..." id="gameDescInput"></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-tags"></i> 游戏标签（可选）</label>
                <input type="text" placeholder="例如：动作、休闲、射击、益智、冒险" id="gameTagInput">
            </div>
            <div class="submit-row">
                <button class="btn btn-primary" onclick="submitGame()">
                    <i class="fas fa-paper-plane"></i> 提交发布
                </button>
            </div>
            <div id="submitStatus" style="margin-top:1rem;text-align:center;font-size:0.9rem;"></div>
        </div>
    </main>
</div>

<!-- 游玩页 -->
<div id="play-page" class="page" style="display:none;">
    <main class="play-page">
        <div class="play-bar">
            <a href="#" class="back-link" onclick="showPage('browse'); return false;"><i class="fas fa-arrow-left"></i> 返回</a>
            <span class="game-name" id="playGameTitle"></span>
        </div>
        <div class="game-frame-wrap">
            <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-popups allow-modals allow-forms"></iframe>
        </div>
    </main>
</div>

<footer>
    <p><i class="fas fa-gamepad"></i> &copy; 2026 GameBao - 个人游戏开发者平台</p>
    <div class="footer-tags">
        <span><i class="fas fa-bolt"></i> 一键发布</span>
        <span><i class="fas fa-play"></i> 上传即玩</span>
        <span><i class="fas fa-globe"></i> 公开分享</span>
        <span><i class="fas fa-shield-alt"></i> 零成本托管</span>
    </div>
</footer>

<script>
// ===== 配置 =====
const GITHUB_REPO = 'leozh123/gamebao';
const GITHUB_TOKEN = 'ghp_HDb0L78da3SEDQG9yvMs4bPNi4M0063wG26h'; // PAT token

// ===== 数据存储 =====
let uploadedGames = [];
let currentPlayId = null;

// 从 games/index.json 加载游戏列表
async function loadGamesFromIndex() {
    try {
        const response = await fetch('games/index.json?t=' + Date.now());
        if (!response.ok) throw new Error('Failed to load');
        const games = await response.json();
        uploadedGames = games.map(g => ({
            id: g.id,
            title: g.title,
            tag: g.tags || '未分类',
            url: g.url,
            cover: g.cover,
            description: g.description,
            uploadTime: new Date(g.createdAt).toLocaleDateString('zh-CN'),
            hasCover: !!g.cover
        }));
    } catch(e) {
        console.log('No games yet');
        uploadedGames = [];
    }
    renderGames();
}

// ===== UI 渲染 =====
const iconMap = { '动作': '⚔️', '休闲': '🎮', '射击': '🎯', '益智': '🧩', '冒险': '🗺️', '策略': '♟️' };

function createCard(game) {
    const icon = iconMap[game.tag] || '🎮';
    const coverHTML = game.hasCover
        ? `<img src="${game.cover}" alt="${game.title}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
        : '';
    const fallbackHTML = `<span class="fallback-icon" style="display:${game.hasCover ? 'none' : 'flex'};width:100%;height:100%;align-items:center;justify-content:center;position:absolute;top:0;left:0;">${icon}</span>`;
    
    return `
    <div class="game-card" onclick="playGame(${game.id})">
        <div class="game-thumbnail" style="position:relative;">${coverHTML}${fallbackHTML}<span class="game-tag">${game.tag}</span></div>
        <div class="game-info">
            <div class="game-title">${game.title}</div>
            <div class="game-author"><i class="fas fa-clock"></i> ${game.uploadTime}</div>
        </div>
        <a class="play-btn" onclick="event.stopPropagation(); playGame(${game.id})">
            <i class="fas fa-play"></i> 开始游戏
        </a>
    </div>`;
}

function renderGames() {
    const container = document.getElementById('featured-games');
    const allContainer = document.getElementById('all-games');
    document.getElementById('game-count').textContent = uploadedGames.length;

    if (uploadedGames.length === 0) {
        const emptyHTML = `<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><p>还没有游戏，去发布一个吧！</p></div>`;
        container.innerHTML = emptyHTML;
        allContainer.innerHTML = emptyHTML;
    } else {
        container.innerHTML = uploadedGames.slice(0, 6).map(createCard).join('');
        allContainer.innerHTML = uploadedGames.map(createCard).join('');
    }
}

// ===== 页面切换 =====
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    const target = document.getElementById(page + '-page');
    if (target) target.style.display = 'block';
    if (page === 'home' || page === 'browse') loadGamesFromIndex();
    window.scrollTo(0, 0);
}

// ===== 发布游戏 =====
async function submitGame() {
    const name = document.getElementById('gameNameInput').value.trim();
    const url = document.getElementById('gameUrlInput').value.trim();
    const cover = document.getElementById('coverUrlInput').value.trim();
    const desc = document.getElementById('gameDescInput').value.trim();
    const tags = document.getElementById('gameTagInput').value.trim();

    if (!name || !url) {
        showToast('请填写游戏名称和链接');
        return;
    }

    const status = document.getElementById('submitStatus');
    status.innerHTML = '<span style="color:#f7c948;"><i class="fas fa-spinner fa-spin"></i> 正在提交...</span>';

    // 构建 Issue body
    const issueBody = `**游戏名称**: ${name}
**游戏链接**: ${url}
**封面图片链接**: ${cover}
**游戏描述**: ${desc}
**游戏标签**: ${tags}`;

    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues`, {
            method: 'POST',
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: `[游戏发布] ${name}`,
                body: issueBody,
                labels: ['game-submission']
            })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || 'Failed to create issue');
        }

        const issue = await response.json();
        status.innerHTML = `<span style="color:#22c55e;"><i class="fas fa-check-circle"></i> 提交成功！Issue #${issue.number} 已创建，等待 Actions 自动发布...</span>
            <br><a href="${issue.html_url}" target="_blank" style="color:#ff6b35;">查看 Issue 详情</a>`;
        
        // 清空表单
        document.getElementById('gameNameInput').value = '';
        document.getElementById('gameUrlInput').value = '';
        document.getElementById('coverUrlInput').value = '';
        document.getElementById('gameDescInput').value = '';
        document.getElementById('gameTagInput').value = '';

        showToast('提交成功！等待自动发布...');
    } catch(err) {
        status.innerHTML = `<span style="color:#dc2626;"><i class="fas fa-times-circle"></i> 提交失败：${err.message}</span>`;
    }
}

// ===== 游玩游戏 =====
function playGame(id) {
    const game = uploadedGames.find(g => g.id === id);
    if (!game) { showToast('游戏不存在'); return; }

    currentPlayId = id;
    showPage('play');
    document.getElementById('playGameTitle').innerHTML = `<i class="fas fa-gamepad"></i> ${game.title}`;
    document.getElementById('gameFrame').src = game.url;
}

// ===== 工具函数 =====
function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast'; toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
}

// ===== 初始化 =====
loadGamesFromIndex();
</script>

</body>
</html>
