<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{GAME_NAME}} - GameBao</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        nav {
            background: #1a1a1a;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b35, #f7c948);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .back-link {
            color: #aaa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: #ff6b35; }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .game-header {
            margin-bottom: 1.5rem;
        }
        .game-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .game-meta {
            display: flex;
            gap: 1rem;
            color: #888;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .game-tag {
            background: rgba(255,107,53,0.15);
            color: #ff6b35;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        
        .cover-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
        }
        
        .game-frame-wrap {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            margin-bottom: 1.5rem;
        }
        .game-frame-wrap iframe {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
        }
        
        .game-description {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #222;
            margin-bottom: 1.5rem;
        }
        .game-description h3 {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            color: #f7c948;
        }
        .game-description p {
            color: #aaa;
            line-height: 1.6;
        }
        
        .external-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(45deg, #ff6b35, #f7c948);
            color: #000;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .external-link:hover {
            transform: translateY(-2px);
        }
        
        footer {
            background: #111;
            text-align: center;
            padding: 2rem;
            color: #555;
            margin-top: 3rem;
            border-top: 1px solid #1a1a1a;
        }
        
        @media (max-width: 768px) {
            .game-frame-wrap iframe { height: 500px; }
            .game-container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html" class="logo"><i class="fas fa-gamepad"></i> GameBao</a>
        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </nav>
    
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title"><i class="fas fa-gamepad" style="color:#ff6b35;"></i> {{GAME_NAME}}</h1>
            <div class="game-meta">
                <span class="game-tag">{{TAGS}}</span>
                <span><i class="fas fa-clock"></i> {{CREATED_AT}}</span>
            </div>
        </div>
        
        {{#COVER_URL}}
        <img src="{{COVER_URL}}" alt="{{GAME_NAME}}" class="cover-image" onerror="this.style.display='none'">
        {{/COVER_URL}}
        
        <div class="game-frame-wrap">
            <iframe src="{{GAME_URL}}" sandbox="allow-scripts allow-same-origin allow-popups allow-modals allow-forms"></iframe>
        </div>
        
        {{#DESCRIPTION}}
        <div class="game-description">
            <h3><i class="fas fa-info-circle"></i> 游戏介绍</h3>
            <p>{{DESCRIPTION}}</p>
        </div>
        {{/DESCRIPTION}}
        
        <div style="text-align: center;">
            <a href="{{GAME_URL}}" target="_blank" class="external-link">
                <i class="fas fa-external-link-alt"></i> 在新窗口打开游戏
            </a>
        </div>
    </div>
    
    <footer>
        <p><i class="fas fa-gamepad"></i> &copy; 2026 GameBao - 个人游戏开发者平台</p>
    </footer>
</body>
</html>
